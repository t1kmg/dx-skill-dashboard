<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DXスキル学習ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DX学習">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#818cf8">
</head>
<body>
  <!-- ナビゲーション -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-icon">📚</span>
      <span class="nav-title">DX学習</span>
    </div>
    <div class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" data-view="dashboard">ダッシュボード</button>
      <button class="nav-tab" data-view="cert-g-ken">G検定</button>
      <button class="nav-tab" data-view="cert-sc">SC試験</button>
      <button class="nav-tab" data-view="flashcard">カード</button>
    </div>
    <div id="sync-status" class="sync-status"></div>
    <div class="nav-xp" id="nav-xp">
      <span class="xp-level" id="nav-level">Lv.1</span>
      <div class="xp-bar-mini"><div class="xp-fill-mini" id="nav-xp-fill"></div></div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main" id="main-content">

    <!-- ===== ダッシュボード ===== -->
    <div id="view-dashboard" class="view active">

      <!-- ヒーロー：ストリーク＋全体XP -->
      <section class="hero-card">
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-value" id="dash-streak">0</div>
            <div class="hero-stat-label">🔥 連続学習日</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value" id="dash-level">1</div>
            <div class="hero-stat-label">⭐ レベル</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value" id="dash-xp">0</div>
            <div class="hero-stat-label">✨ 総XP</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value" id="dash-tasks">0</div>
            <div class="hero-stat-label">✅ 完了タスク</div>
          </div>
        </div>
        <div class="xp-progress-wrap">
          <div class="xp-progress-label">
            <span>次のレベルまで</span>
            <span id="dash-xp-next">100 XP</span>
          </div>
          <div class="xp-bar"><div class="xp-fill" id="dash-xp-bar"></div></div>
        </div>
        <div id="exam-countdown" class="exam-countdown"></div>
      </section>

      <!-- 資格カード -->
      <section class="section">
        <h2 class="section-title">資格の進捗</h2>
        <div class="cert-cards" id="cert-cards"></div>
      </section>

      <!-- ロードマップ -->
      <section class="section">
        <h2 class="section-title">学習ロードマップ（2026〜2027）</h2>
        <div class="roadmap-wrap" id="roadmap"></div>
      </section>

      <!-- 学習カレンダー -->
      <section class="section">
        <h2 class="section-title">学習カレンダー <span class="badge-label">過去16週</span></h2>
        <div id="activity-calendar"></div>
      </section>

      <!-- 今日のタスク -->
      <section class="section">
        <h2 class="section-title">今日やること <span class="badge-label" id="today-date"></span></h2>
        <div id="today-tasks" class="today-tasks"></div>
      </section>

      <!-- 完了済みタスク一覧（さかのぼり確認） -->
      <section class="section">
        <div class="section-header-row">
          <h2 class="section-title">完了済みタスク一覧</h2>
          <div class="btn-group">
            <button class="outline-btn" id="sync-btn">☁️ 今すぐ同期</button>
            <button class="outline-btn" id="export-btn">📤 エクスポート</button>
            <button class="outline-btn" id="import-btn">📥 インポート</button>
            <button class="outline-btn danger-outline" id="reset-btn">🗑 リセット</button>
            <input type="file" id="import-file" accept=".json" style="display:none">
          </div>
        </div>
        <div id="completed-log"></div>
      </section>

      <!-- バッジ -->
      <section class="section">
        <h2 class="section-title">バッジ</h2>
        <div class="badges-grid" id="badges-grid"></div>
      </section>

    </div>

    <!-- ===== 資格詳細（共通テンプレート） ===== -->
    <div id="view-cert-g-ken" class="view">
      <div id="cert-detail-g-ken"></div>
    </div>
    <div id="view-cert-sc" class="view">
      <div id="cert-detail-sc"></div>
    </div>

    <!-- ===== フラッシュカード ===== -->
    <div id="view-flashcard" class="view">
      <div class="fc-header">
        <h2 class="section-title" style="margin-bottom:0">フラッシュカード</h2>
        <p class="fc-subtitle">タップでめくる。苦手カードが優先表示されます。</p>
      </div>
      <div class="fc-filter-wrap">
        <button class="fc-filter-btn active" data-filter="all">全て（40枚）</button>
        <button class="fc-filter-btn" data-filter="g-ken">🤖 G検定（20枚）</button>
        <button class="fc-filter-btn" data-filter="sc">🔐 SC試験（20枚）</button>
      </div>
      <div id="fc-area"></div>
    </div>

  </main>

  <!-- ポモドーロタイマー -->
  <div class="pomodoro" id="pomodoro">
    <div class="pomo-header">
      <span id="pomo-mode">🍅 集中</span>
      <button class="pomo-close-btn" id="pomo-close">×</button>
    </div>
    <div class="pomo-time" id="pomo-time">25:00</div>
    <div class="pomo-controls">
      <button class="pomo-btn pomo-primary" id="pomo-toggle">▶ 開始</button>
      <button class="pomo-btn" id="pomo-reset">↺</button>
    </div>
  </div>
  <button class="pomo-fab" id="pomo-fab" title="ポモドーロタイマー">🍅</button>

  <!-- 通知バナー -->
  <div id="notif-banner" class="notif-banner" style="display:none">
    <span>🔔 毎日の学習リマインダーを受け取りますか？</span>
    <button class="outline-btn" id="notif-allow">許可する</button>
    <button class="pomo-close-btn" id="notif-dismiss">×</button>
  </div>

  <!-- 取り消しトースト -->
  <div class="toast" id="toast">
    <span id="toast-msg"></span>
    <button class="toast-undo-btn" id="toast-undo" style="display:none">↩ 取り消し</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
